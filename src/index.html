<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wraith</title>
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #0d0d0d;
            --surface-elevated: #1a1a1a;
            --border-color: #2a2a2a;
            --text-main: #e5e5e5;
            --text-muted: #666666;
            --text-dim: #444444;
            --accent: #ffffff;
            --accent-hover: #cccccc;
            --danger: #ff4444;
            --danger-dim: #661a1a;
            --user-bubble: #ffffff;
            --user-text: #000000;
            --ai-bubble: #1a1a1a;
            --ai-border: #333333;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: "SF Mono", "Fira Code", Consolas, "Liberation Mono", Menlo, monospace;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: 100vh;
            max-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-main);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff8855;
        }

        .status-dot.recording {
            background-color: var(--danger);
            box-shadow: 0 0 8px #ff444455;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .https-notice {
            background: var(--danger-dim);
            border: 1px solid var(--danger);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            font-size: 12px;
            line-height: 1.5;
            display: none;
        }

        .https-notice.visible {
            display: block;
        }

        .https-notice strong {
            color: var(--danger);
        }

        .https-notice code {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: var(--font-mono);
        }

        .chat-log {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 8px 0;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.ai {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user .message-bubble {
            background-color: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-bubble {
            background-color: var(--ai-bubble);
            border: 1px solid var(--ai-border);
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 4px;
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message.user .message-sender {
            color: var(--text-muted);
        }

        .audio-mini {
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: var(--surface-elevated);
            border-radius: 20px;
            width: fit-content;
        }

        .audio-mini button {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 0;
            font-size: 12px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.15s;
        }

        .audio-mini button:hover {
            background: var(--border-color);
        }

        .audio-mini .progress {
            width: 60px;
            height: 3px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }

        .audio-mini .progress-fill {
            height: 100%;
            background: var(--text-main);
            width: 0%;
            transition: width 0.1s;
        }

        .audio-mini .duration {
            font-size: 10px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .input-area {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: var(--font-stack);
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            outline: none;
            padding: 0;
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            background: var(--text-main);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 16px;
            height: 16px;
            fill: var(--bg-color);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        button.action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-muted);
            font-size: 12px;
            font-family: var(--font-stack);
            cursor: pointer;
            transition: all 0.15s;
        }

        button.action-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        button.action-btn.active {
            background: var(--danger-dim);
            border-color: var(--danger);
            color: var(--danger);
        }

        button.action-btn svg {
            width: 14px;
            height: 14px;
        }

        .status-text {
            font-size: 11px;
            color: var(--text-dim);
            font-family: var(--font-mono);
        }

        .status-text.active {
            color: var(--text-muted);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        /* Voice Call Overlay */
        .voice-call-ui {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface-elevated);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px 30px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            min-width: 300px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .voice-call-ui.active {
            display: flex;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .waveform {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 40px;
        }

        .waveform-bar {
            width: 4px;
            background: var(--text-main);
            border-radius: 2px;
            transition: height 0.05s;
        }

        .transcription-preview {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            min-height: 20px;
            font-style: italic;
        }

        .voice-call-ui .end-call {
            padding: 8px 20px;
            background: var(--danger);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .voice-call-ui .end-call:hover {
            background: #cc3333;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 12px;
            }
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>WRAITH</h1>
            <div class="status-badge">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Ready</span>
            </div>
        </div>

        <div class="https-notice" id="https-notice">
            <strong>Microphone access requires HTTPS.</strong><br>
            For mobile/remote access, use: <code id="https-url">https://YOUR_IP:2027</code><br>
            <small>Accept the self-signed certificate when prompted.</small>
        </div>

        <div class="chat-log" id="chat-log">
            <div class="message ai">
                <span class="message-sender">Wraith</span>
                <div class="message-bubble">Speak or type. I'm listening.</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-row">
                <textarea id="text-input" placeholder="Type a message..." rows="1"></textarea>
                <button class="send-btn" id="btn-send" title="Send (Enter)">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
            <div class="controls">
                <div class="btn-group">
                    <button class="action-btn" id="btn-record">
                        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
                        <span>Record</span>
                    </button>
                    <button class="action-btn" id="btn-voice-call">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                        <span>Voice Call</span>
                    </button>
                </div>
                <span class="status-text" id="system-status">Enter to send • Shift+Enter for new line</span>
            </div>
        </div>
    </div>

    <div class="voice-call-ui" id="voice-call-ui">
        <div class="waveform" id="waveform"></div>
        <div class="transcription-preview" id="transcription-preview">Listening...</div>
        <button class="end-call" id="btn-end-call">End Call</button>
    </div>

    <script>
        const chatLog = document.getElementById('chat-log');
        const textInput = document.getElementById('text-input');
        const btnSend = document.getElementById('btn-send');
        const btnRecord = document.getElementById('btn-record');
        const btnVoiceCall = document.getElementById('btn-voice-call');
        const systemStatus = document.getElementById('system-status');
        const statusDot = document.getElementById('status-dot');
        const voiceCallUI = document.getElementById('voice-call-ui');
        const transcriptionPreview = document.getElementById('transcription-preview');
        const waveform = document.getElementById('waveform');
        const btnEndCall = document.getElementById('btn-end-call');
        const httpsNotice = document.getElementById('https-notice');
        const httpsUrlEl = document.getElementById('https-url');

        const baseUrl = window.location.href;
        
        const isSecureContext = window.location.protocol === 'https:' || 
                               window.location.hostname === 'localhost' ||
                               window.location.hostname === '127.0.0.1';
        
        if (!isSecureContext) {
            const host = window.location.hostname;
            httpsUrlEl.textContent = `https://${host}:2027`;
            httpsNotice.classList.add('visible');
        }

        let mediaRecorder;
        let audioChunks = [];
        let globalMediaStream = null;
        let audioContext;
        let analyserNode;
        let microphoneSource;
        let vadRafId;
        let isRecordingSTT = false;
        let isVoiceCallActive = false;
        let isRecordingCall = false;
        let isProcessingCallQuery = false;
        let currentAudio = null;

        const VOLUME_THRESHOLD_SPEAKING = 5.0;
        const VOLUME_THRESHOLD_INTERRUPT = 8.0;
        const SILENCE_MS_THRESHOLD = 3000;
        let lastSpeakTimestamp = 0;

        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div');
            bar.className = 'waveform-bar';
            bar.style.height = '8px';
            waveform.appendChild(bar);
        }

        function setStatus(text, active = false) {
            systemStatus.textContent = text;
            systemStatus.classList.toggle('active', active);
            statusDot.classList.toggle('recording', active);
        }

        function scrollToBottom() {
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function appendMessage(role, content, audioB64 = null) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;

            let html = `<span class="message-sender">${role === 'user' ? 'You' : 'Wraith'}</span>`;
            html += `<div class="message-bubble">${escapeHtml(content)}</div>`;

            if (role === 'ai' && audioB64) {
                html += createAudioMiniHTML(audioB64);
            }

            msg.innerHTML = html;
            chatLog.appendChild(msg);
            scrollToBottom();

            if (role === 'ai' && audioB64) {
                setupAudioMini(msg, audioB64);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function createAudioMiniHTML(b64) {
            const id = 'audio-' + Math.random().toString(36).substr(2, 9);
            return `
                <div class="audio-mini" data-id="${id}">
                    <button class="play-btn" title="Play">▶</button>
                    <div class="progress"><div class="progress-fill"></div></div>
                    <span class="duration">0:00</span>
                </div>
            `;
        }

        function setupAudioMini(container, b64) {
            const mini = container.querySelector('.audio-mini');
            if (!mini) return;

            const audio = new Audio(`data:audio/wav;base64,${b64}`);
            const playBtn = mini.querySelector('.play-btn');
            const progressFill = mini.querySelector('.progress-fill');
            const duration = mini.querySelector('.duration');

            audio.addEventListener('loadedmetadata', () => {
                const mins = Math.floor(audio.duration / 60);
                const secs = Math.floor(audio.duration % 60);
                duration.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            });

            audio.addEventListener('timeupdate', () => {
                const pct = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${pct}%`;
                const mins = Math.floor(audio.currentTime / 60);
                const secs = Math.floor(audio.currentTime % 60);
                duration.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            });

            audio.addEventListener('ended', () => {
                playBtn.textContent = '▶';
                progressFill.style.width = '0%';
            });

            playBtn.addEventListener('click', () => {
                if (currentAudio && currentAudio !== audio) {
                    currentAudio.pause();
                    document.querySelectorAll('.play-btn').forEach(b => b.textContent = '▶');
                }
                if (audio.paused) {
                    audio.play();
                    playBtn.textContent = '⏸';
                    currentAudio = audio;
                } else {
                    audio.pause();
                    playBtn.textContent = '▶';
                }
            });
        }

        async function attachMic() {
            try {
                if (!globalMediaStream) {
                    const constraints = {
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        }
                    };
                    
                    globalMediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                }
                
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();

                if (microphoneSource) microphoneSource.disconnect();
                microphoneSource = audioContext.createMediaStreamSource(globalMediaStream);

                if (!analyserNode) {
                    analyserNode = audioContext.createAnalyser();
                    analyserNode.fftSize = 256;
                }
                microphoneSource.connect(analyserNode);

                const mimeType = getSupportedMimeType();
                mediaRecorder = new MediaRecorder(globalMediaStream, { mimeType });
                audioChunks = [];

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                return true;
            } catch (err) {
                console.error('Mic error:', err);
                handleMicError(err);
                return false;
            }
        }
        
        function getSupportedMimeType() {
            const types = [
                'audio/webm;codecs=opus',
                'audio/webm',
                'audio/ogg;codecs=opus',
                'audio/ogg',
                'audio/mp4',
                'audio/wav'
            ];
            
            for (const type of types) {
                if (MediaRecorder.isTypeSupported(type)) {
                    return type;
                }
            }
            
            return 'audio/webm';
        }
        
        function handleMicError(err) {
            let message = 'Microphone error. Please check permissions.';
            
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                if (!isSecureContext) {
                    message = 'Microphone requires HTTPS. See banner above for the secure URL.';
                    httpsNotice.classList.add('visible');
                } else {
                    message = 'Microphone access denied. Please allow microphone access in your browser settings.';
                }
            } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                message = 'No microphone found. Please connect a microphone.';
            } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                message = 'Microphone is in use by another application.';
            } else if (err.name === 'OverconstrainedError') {
                message = 'Microphone constraints could not be satisfied.';
            }
            
            setStatus(message, false);
            console.error('Mic error:', err.name, err.message);
        }

        function stopMediaRecorder() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        async function transcribe(b64) {
            const params = new URLSearchParams();
            params.append('audio_base64', b64);
            const res = await fetch(`${baseUrl}transcribe`, { method: 'POST', body: params });
            return await res.text();
        }

        async function chat(text) {
            const params = new URLSearchParams();
            params.append('text', text);
            const res = await fetch(`${baseUrl}chat`, { method: 'POST', body: params });
            return await res.text();
        }

        async function synthesize(text) {
            const params = new URLSearchParams();
            params.append('text', text);
            const res = await fetch(`${baseUrl}synthesize`, { method: 'POST', body: params });
            const html = await res.text();
            const match = html.match(/src="([^"]+)"/);
            return match ? match[1].split(',')[1] : null;
        }

        async function sendMessage() {
            const text = textInput.value.trim();
            if (!text) return;

            textInput.value = '';
            textInput.style.height = 'auto';
            appendMessage('user', text);

            setStatus('Thinking...', true);

            try {
                const response = await chat(text);

                if (response.startsWith('Error')) {
                    appendMessage('ai', 'Connection lost. Is LM Studio running?');
                    setStatus('', false);
                    return;
                }

                setStatus('Speaking...', true);
                const audioB64 = await synthesize(response);

                appendMessage('ai', response, audioB64);
                
                if (audioB64) {
                    const audio = new Audio(`data:audio/wav;base64,${audioB64}`);
                    currentAudio = audio;
                    audio.play();
                    
                    audio.onended = () => {
                        currentAudio = null;
                    };
                }
                
                setStatus('', false);

            } catch (err) {
                console.error(err);
                appendMessage('ai', 'Something went wrong. Try again.');
                setStatus('', false);
            }
        }

        textInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        textInput.addEventListener('input', () => {
            textInput.style.height = 'auto';
            textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
        });

        btnSend.addEventListener('click', sendMessage);

        btnRecord.addEventListener('click', async () => {
            if (isVoiceCallActive) return;

            if (!isRecordingSTT) {
                const started = await attachMic();
                if (started) {
                    isRecordingSTT = true;
                    btnRecord.classList.add('active');
                    mediaRecorder.start();
                    setStatus('Recording...', true);
                }
            } else {
                isRecordingSTT = false;
                btnRecord.classList.remove('active');
                setStatus('Transcribing...', true);

                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        const b64 = reader.result.split(',')[1];
                        const text = await transcribe(b64);
                        if (text && text !== 'Transcription failed.') {
                            textInput.value = text;
                        }
                        setStatus('', false);
                    };
                };
                stopMediaRecorder();
            }
        });

        btnVoiceCall.addEventListener('click', () => {
            if (!isVoiceCallActive) startVoiceCall();
            else endVoiceCall();
        });

        btnEndCall.addEventListener('click', endVoiceCall);

        function startVoiceCall() {
            isVoiceCallActive = true;
            btnVoiceCall.classList.add('active');
            voiceCallUI.classList.add('active');
            setStatus('Voice call active', true);
            startVoiceCallLoop(false);
        }

        function endVoiceCall() {
            isVoiceCallActive = false;
            isRecordingCall = false;
            isProcessingCallQuery = false;
            btnVoiceCall.classList.remove('active');
            voiceCallUI.classList.remove('active');
            stopMediaRecorder();
            if (vadRafId) cancelAnimationFrame(vadRafId);
            setStatus('', false);
        }

        async function startVoiceCallLoop(fromInterruption) {
            isProcessingCallQuery = false;
            stopMediaRecorder();
            if (analyserNode) analyserNode.disconnect();
            transcriptionPreview.textContent = 'Listening...';

            if (fromInterruption) {
                appendMessage('user', '[Interrupted]');
            }

            const started = await attachMic();
            if (!started) {
                endVoiceCall();
                return;
            }

            isRecordingCall = true;
            lastSpeakTimestamp = Date.now();
            mediaRecorder.start();
            vadRafId = requestAnimationFrame(tickVAD);
        }

        function tickVAD() {
            if (!isVoiceCallActive) return;

            if (analyserNode) {
                const data = new Uint8Array(analyserNode.frequencyBinCount);
                analyserNode.getByteTimeDomainData(data);

                let sum = 0;
                for (let i = 0; i < data.length; i++) {
                    const val = (data[i] / 128) - 1;
                    sum += val * val;
                }
                const rms = Math.sqrt(sum / data.length) * 100;

                const bars = waveform.querySelectorAll('.waveform-bar');
                bars.forEach((bar, i) => {
                    const h = Math.max(4, rms * (0.5 + Math.random() * 0.5) * 20);
                    bar.style.height = `${h}px`;
                });

                const now = Date.now();

                if (isRecordingCall && !isProcessingCallQuery) {
                    if (rms > VOLUME_THRESHOLD_SPEAKING) {
                        lastSpeakTimestamp = now;
                        transcriptionPreview.textContent = 'Listening...';
                    } else {
                        const silent = now - lastSpeakTimestamp;
                        if (silent > SILENCE_MS_THRESHOLD) {
                            stopRecordingAndProcess();
                        } else if (silent > 1000) {
                            transcriptionPreview.textContent = `Speak or wait... (${((SILENCE_MS_THRESHOLD - silent) / 1000).toFixed(1)}s)`;
                        }
                    }
                } else if (!isRecordingCall && currentAudio && !currentAudio.paused) {
                    if (rms > VOLUME_THRESHOLD_INTERRUPT) {
                        currentAudio.pause();
                        transcriptionPreview.textContent = 'Interrupted!';
                        setTimeout(() => startVoiceCallLoop(true), 500);
                        return;
                    }
                }
            }

            vadRafId = requestAnimationFrame(tickVAD);
        }

        function stopRecordingAndProcess() {
            isProcessingCallQuery = true;
            isRecordingCall = false;
            transcriptionPreview.textContent = 'Processing...';
            setStatus('Processing...', true);

            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                    const b64 = reader.result.split(',')[1];

                    const text = await transcribe(b64);
                    if (!text || text === 'Transcription failed.' || !text.trim()) {
                        startVoiceCallLoop(false);
                        return;
                    }

                    appendMessage('user', text);

                    const response = await chat(text);
                    if (response.startsWith('Error')) {
                        appendMessage('ai', 'LM Studio connection lost.');
                        startVoiceCallLoop(false);
                        return;
                    }

                    appendMessage('ai', response);
                    const audioB64 = await synthesize(response);

                    if (audioB64) {
                        const audio = new Audio(`data:audio/wav;base64,${audioB64}`);
                        currentAudio = audio;
                        audio.play();
                        transcriptionPreview.textContent = 'Speaking...';
                        setStatus('', false);

                        audio.onended = () => {
                            currentAudio = null;
                            startVoiceCallLoop(false);
                        };
                    } else {
                        startVoiceCallLoop(false);
                    }
                };
            };
            stopMediaRecorder();
        }
    </script>
</body>
